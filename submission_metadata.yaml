# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Sarthak6o1/ProofRank"
sandbox_link: "https://huggingface.co/spaces/Sarthak080907/proofrank"
reproduce_command: "python rank.py --indices ./indices --out ./submission.csv"
# Pre-built indices/ on GitHub (Git LFS). Ranking step completes in ~15 s on CPU with no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 laptop, CPU-only"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 85

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Cursor"
  - "ChatGPT"

ai_usage_summary: |
  Cursor was used for coding. ChatGPT was used for debugging and architecture diagrams.
  The ranking step does not call any hosted LLM or external API. Candidate data is processed
  locally by deterministic feature extraction, cached retrieval indexes, and rule-based
  reasoning generation. No candidate data was sent to any hosted LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  ProofRank is a CPU-only hybrid ranker for the Redrob Senior AI Engineer JD. Offline
  pre-built indices/ (FAISS, BM25, features.parquet) are on GitHub via Git LFS.
  Reviewers clone, run git lfs install and git lfs pull, pip install -r requirements-rank.txt, then run
  reproduce_command with no network. Live sandbox on HuggingFace ranks the organizer
  50-profile sample via indices_sample/ using the same rank_sandbox() path as
  production rank.py.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
