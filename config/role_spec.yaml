role_name: "Senior AI Engineer - Founding Team"
jd_query: |
  Senior AI Engineer founding team role at Redrob AI. Own ranking, retrieval,
  candidate-job matching, embeddings, hybrid search, vector databases, learning
  to rank, recommendation systems, RAG, LLM fine-tuning, Python production code,
  offline evaluation, NDCG, MRR, MAP, A/B testing, recruiter feedback loops.
  Prefer 5-9 years, India, Pune or Noida, product-company ML systems, scrappy
  shipper mindset. Avoid keyword-only AI skills, research-only, consulting-only,
  LangChain tutorial profiles, title chasers, and stale low-response candidates.

# BM25-only query (positive recall). Dense search uses cached jd_query_vec.npy.
retrieval_query: |
  Senior AI Engineer ranking retrieval embeddings hybrid search vector database
  recommendation systems learning to rank Python production deployed real users
  offline evaluation NDCG MRR MAP A/B testing recruiter matching Pune Noida India
  product company semantic search FAISS sentence-transformers

retrieval:
  top_k: 3000
  rrf_k: 60
  safety_pool: 350

scoring_weights:
  retrieval_rrf: 0.14
  career_evidence: 0.38
  title_tier: 0.13
  yoe_location_fit: 0.09
  skill_trust: 0.07
  assessment_score: 0.05
  product_company: 0.04
  education_score: 0.04
  company_scale_score: 0.03
  work_mode_fit: 0.02
  platform_activity_score: 0.02
  anti_pattern_penalty: 0.12

